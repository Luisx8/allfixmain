spring:
  config:
    import: optional:file:.env.local[.properties]
  application:
    name: rework

  # Security & OAuth2
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.${cognito.region}.amazonaws.com/${cognito.user-pool-id}
          jwk-set-uri: https://cognito-idp.${cognito.region}.amazonaws.com/${cognito.user-pool-id}/.well-known/jwks.json
      client:
        registration:
          cognito:
            client-id: ${cognito.client-id}
            client-secret: ${cognito.client-secret}
            authorization-grant-type: authorization_code
            scope: openid,email,profile
        provider:
          cognito:
            issuer-uri: https://cognito-idp.${cognito.region}.amazonaws.com/${cognito.user-pool-id}
            user-name-attribute: email
            authorization-uri: https://${cognito.domain}/oauth2/authorize
            token-uri: https://${cognito.domain}/oauth2/token
            user-info-uri: https://${cognito.domain}/oauth2/userInfo
            jwk-set-uri: https://cognito-idp.${cognito.region}.amazonaws.com/${cognito.user-pool-id}/.well-known/jwks.json

  redis:
    host: ${REDIS_HOST:${redis.host:localhost}}
    port: ${REDIS_PORT:${redis.port:6379}}
    password: ${REDIS_PASSWORD:${redis.password:}}
    timeout: 2000ms
    jedis:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

  # CORS
  web:
    cors:
      allowed-origins: http://localhost:5173,http://localhost:3000
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

# Logging
logging:
  level:
    root: INFO
    ph.allfix: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

# Cognito Configuration
cognito:
  region: ${COGNITO_REGION:ap-southeast-2}
  user-pool-id: ${COGNITO_USER_POOL_ID:ap-southeast-2_p7mounHZf}
  client-id: ${COGNITO_CLIENT_ID:61106lhm2fgpp3aqo2ighth8hd}
  scope: ${COGNITO_SCOPE:openid,email}
  client-secret: ${COGNITO_CLIENT_SECRET:local-dev-secret}
  domain: ${COGNITO_DOMAIN:ap-southeast-2p7mounhzf.auth.ap-southeast-2.amazoncognito.com}
  pms-custom-attribute-name: ${COGNITO_PMS_CUSTOM_ATTRIBUTE_NAME:}
  dummy-email-domain: ${COGNITO_DUMMY_EMAIL_DOMAIN:allfix.internal}

# Backend URLs
app:
  backend-url: ${BACKEND_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  cognito-redirect-uri: ${COGNITO_REDIRECT_URI:${BACKEND_URL:http://localhost:8080}/login/oauth2/code/cognito}

# PMS Integration
pms:
  backend-secret: ${PMS_BACKEND_SECRET:dev-secret-key}
  trusted-sso-secret: ${PMS_TRUSTED_SSO_SECRET:38486ced33de7619ae549021035fc9ce3e86df5606ffeca01739f14716b6f254}
  state-token-ttl: 300
  auto-verify-email: ${PMS_AUTO_VERIFY_EMAIL:true}

# Auth Provisioning Strategy
auth:
  # When provided, this Lambda is invoked before Cognito provisioning.
  lambda-auth-arn: ${LAMBDA_AUTH_ARN:}
  # If true, backend trusts Lambda as provisioning source of truth and skips direct Cognito admin writes.
  lambda-only-provisioning: ${AUTH_LAMBDA_ONLY_PROVISIONING:false}
  # Enforce Cognito provisioning as the source of truth before any session cache write.
  strict-cognito-provisioning: ${STRICT_COGNITO_PROVISIONING:true}

# Server
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
